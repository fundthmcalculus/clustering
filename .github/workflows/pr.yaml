name: pr.yaml
on:
  pull_request:
    branches:
      - main
      - master

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run black format check
        run: |
          black --check .

      - name: Run flake8 lint
        run: |
          flake8 src tests

      - name: Run mypy type check
        run: |
          mypy src

      - name: Run unit tests
        # --ci-fast trims the suite for shared runners: it deselects the
        # wall-clock/plot benchmarks (marked ci_slow) and shrinks oversized
        # correctness inputs. It is also auto-enabled by the GITHUB_ACTIONS
        # env var, so the flag here is explicit documentation of intent.
        run: |
          pytest --ci-fast