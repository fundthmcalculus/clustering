name: pr.yaml
on:
  pull_request:
    branches:
      - main
      - master

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run black format check
        run: |
          black --check .

      - name: Run flake8 lint
        run: |
          flake8 src tests

      - name: Run mypy type check
        run: |
          mypy src

      - name: Run unit tests
        run: |
          pytest